<!DOCTYPE html>
<html>
<head>
<title>SHIX X PRIME LOGIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow: hidden;
}

/* RGB BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, violet);
  background-size: 400%;
  animation: rgb 10s linear infinite;
  z-index: -1;
  filter: blur(80px);
}

@keyframes rgb {
  0% { background-position: 0% }
  100% { background-position: 100% }
}

/* LOGIN BOX */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.7);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

input {
  padding: 10px;
  margin: 10px;
  width: 200px;
}

button {
  padding: 10px;
  width: 100%;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

label {
  font-size: 14px;
}

#verifyBox {
  display: none;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="box">
  <h2>SHIX X PRIME</h2>
  <h3>SECURE LOGIN</h3>

  <input type="text" id="user" placeholder="Username"><br>
  <input type="password" id="pass" placeholder="Password"><br>

  <label>
    <input type="checkbox" id="remember"> Remember Me
  </label><br><br>

  <button onclick="login()">LOGIN</button>

  <p id="msg"></p>

  <div id="verifyBox">
    <p>Verifying secure connection...</p>
    <p id="ray"></p>
  </div>
</div>

<script>

// ✅ LOAD SAVED DATA (STAYS EVEN AFTER PC RESTART)
window.onload = function() {
  let savedUser = localStorage.getItem("savedUser");
  let savedPass = localStorage.getItem("savedPass");

  if (savedUser !== null && savedPass !== null) {
    document.getElementById("user").value = savedUser;
    document.getElementById("pass").value = savedPass;
    document.getElementById("remember").checked = true;
  }
};

// ✅ FAKE RAY ID
function generateRayID() {
  return Math.random().toString(36).substring(2, 10).toUpperCase();
}

// ✅ LOGIN FUNCTION
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;
  let remember = document.getElementById("remember").checked;

  if (u === "gullu" && p === "1") {

    document.getElementById("verifyBox").style.display = "block";
    document.getElementById("msg").innerHTML = "";

    document.getElementById("ray").innerHTML =
      "Ray ID: " + generateRayID();

    setTimeout(() => {

      if (remember) {
        // ✅ SAVES FOREVER (until cleared manually)
        localStorage.setItem("savedUser", u);
        localStorage.setItem("savedPass", p);
      } else {
        localStorage.removeItem("savedUser");
        localStorage.removeItem("savedPass");
      }

      window.location.href = "DASHBOARD.HTM";

    }, 2500);

  } else {
    document.getElementById("msg").innerHTML = "Wrong ❌";
  }
}

</script>

</body>
</html>
